<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CB 會議室</title>
  <link rel="stylesheet" href="../css/app.css" />
</head>
<body>
<div id="app">

  <!-- ── Sticky Toolbar (56px) ──────────────────────────────────────────────── -->
  <header class="toolbar">

    <!-- Logo -->
    <div class="tb-logo">
      <div class="tb-logo-icon">CB</div>
      <span class="tb-logo-text">會議室</span>
    </div>

    <div class="tb-divider"></div>

    <!-- Date + quick shortcuts -->
    <div class="tb-date-group">
      <div class="cal-wrap" id="cal-wrap">
        <button class="tb-date-btn cal-trigger" id="cal-trigger" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span id="cal-display">—</span>
          <span id="cal-dow" class="tb-dow"></span>
        </button>
        <!-- Calendar popup -->
        <div class="cal-popup" id="cal-popup" style="display:none">
          <div class="cal-nav">
            <button class="cal-nav-btn" id="cal-prev" type="button">‹</button>
            <span class="cal-month-label" id="cal-month-label"></span>
            <button class="cal-nav-btn" id="cal-next" type="button">›</button>
          </div>
          <div class="cal-weekdays">
            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
          </div>
          <div class="cal-days" id="cal-days"></div>
          <div class="cal-footer">
            <div class="cal-legend">
              <span class="cal-legend-item">
                <span class="cal-legend-dot cal-legend-holiday"></span>國定假日
              </span>
            </div>
            <div class="cal-holiday-import">
              <input id="holiday-file-input" type="file" accept=".csv" style="display:none">
              <button class="holiday-import-btn" id="btn-load-builtin-holidays" type="button">載入 115 年</button>
              <button class="holiday-import-btn" id="btn-import-holidays" type="button">匯入 CSV</button>
              <button class="holiday-import-btn holiday-clear-btn" id="btn-clear-holidays" type="button">清除</button>
            </div>
            <span id="holiday-import-status" class="holiday-import-status"></span>
          </div>
        </div>
      </div>
      <div class="tb-quick">
        <button class="tb-quick-btn" data-offset="0">今天</button>
        <button class="tb-quick-btn" data-offset="1">+1D</button>
        <button class="tb-quick-btn" data-offset="7">+1W</button>
      </div>
    </div>

    <div class="tb-divider"></div>

    <!-- Period segmented control -->
    <div class="tb-period">
      <button class="tb-period-btn active" data-value="MORNING">上午</button>
      <button class="tb-period-btn" data-value="AFTERNOON">下午</button>
      <button class="tb-period-btn" data-value="ALL">全天</button>
    </div>

    <!-- Building select -->
    <select id="select-building" class="tb-building">
      <option value="6">松仁大樓</option>
      <option value="1">仁愛大樓</option>
      <option value="2">敦化大樓</option>
    </select>

    <!-- Search API button -->
    <button id="btn-search" class="tb-search-btn" disabled type="button">搜尋空房</button>

    <!-- Right group: pushed to the right with margin-left: auto -->
    <div class="tb-right">

      <!-- Room name search (client-side filter) -->
      <div class="tb-room-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
        </svg>
        <input id="input-room-search" type="text" placeholder="搜尋會議室" autocomplete="off" />
        <button id="btn-clear-search" class="tb-clear-search" style="display:none" type="button">×</button>
      </div>

      <!-- Filter panel toggle -->
      <button id="btn-filter" class="tb-filter-btn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 6h18M6 12h12M10 18h4"/>
        </svg>
        篩選
        <span id="filter-count-badge" class="tb-filter-badge" style="display:none">0</span>
      </button>

      <!-- View toggle -->
      <div class="tb-view-toggle">
        <button id="btn-view-card" class="tb-view-btn" title="牌卡檢視" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3"  y="3"  width="8" height="8" rx="1" fill="currentColor"/>
            <rect x="13" y="3"  width="8" height="8" rx="1" fill="currentColor"/>
            <rect x="3"  y="13" width="8" height="8" rx="1" fill="currentColor"/>
            <rect x="13" y="13" width="8" height="8" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <button id="btn-view-table" class="tb-view-btn active" title="時間表檢視" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 6h18M3 12h18M3 18h18"/>
          </svg>
        </button>
      </div>

      <!-- Session status pill -->
      <div id="session-status" class="tb-session tb-session-checking">
        <span class="tb-session-dot"></span>
        <span id="session-text">檢查中</span>
        <button id="btn-login" class="tb-login-btn" style="display:none" type="button">前往登入</button>
      </div>
      <button id="btn-check-session" class="tb-ghost-btn" type="button">重新檢查</button>

    </div><!-- tb-right -->
  </header>

  <!-- ── Holiday Warning ────────────────────────────────────────────────────── -->
  <div id="date-holiday-warning" class="holiday-warning" style="display:none"></div>

  <!-- ── Active Chips Bar ───────────────────────────────────────────────────── -->
  <div id="chips-bar" class="chips-bar" style="display:none"></div>

  <!-- ── Filter Panel (collapsible) ────────────────────────────────────────── -->
  <div id="filter-panel" class="filter-panel-wrap">
    <div class="filter-panel-inner">

      <!-- 時段需求 -->
      <div class="fp-row">
        <span class="fp-label">時段需求</span>
        <div class="fp-time-block">
          <div class="fp-from-wrap">
            <span class="fp-sub-label">從</span>
            <select id="filter-start-time" class="fp-start-select">
              <option value="">不限</option>
            </select>
          </div>
          <span class="fp-arrow">→</span>
          <div class="fp-dur-wrap">
            <span class="fp-sub-label">連續</span>
            <div class="fp-chip-row" id="dur-chips">
              <button class="fp-chip" data-value="30" type="button">0.5 hr</button>
              <button class="fp-chip active" data-value="60" type="button">1 hr</button>
              <button class="fp-chip" data-value="90" type="button">1.5 hr</button>
              <button class="fp-chip" data-value="120" type="button">2 hr</button>
            </div>
          </div>
          <span id="fp-time-preview" class="fp-time-preview" style="display:none"></span>
        </div>
      </div>

      <!-- 容納人數 -->
      <div class="fp-row">
        <span class="fp-label">容納人數</span>
        <div class="fp-chip-row" id="cap-chips">
          <button class="fp-chip active" data-value="0" type="button">不限</button>
          <button class="fp-chip" data-value="5" type="button">5+</button>
          <button class="fp-chip" data-value="10" type="button">10+</button>
          <button class="fp-chip" data-value="15" type="button">15+</button>
          <button class="fp-chip" data-value="20" type="button">20+</button>
        </div>
      </div>

      <!-- 樓層 (動態產生) -->
      <div class="fp-row" id="fp-floor-row" style="display:none">
        <span class="fp-label">樓層</span>
        <div class="fp-chip-row" id="floor-chips"></div>
      </div>

      <!-- 其他 -->
      <div class="fp-row">
        <span class="fp-label">其他</span>
        <div class="fp-checks">
          <label class="fp-check-item">
            <input type="checkbox" id="filter-hide-uncommon" />
            <div class="fp-check-body">
              <span class="fp-check-title">隱藏不常用會議室</span>
              <span class="fp-check-hint">階梯教室、中心樹</span>
            </div>
          </label>
          <label class="fp-check-item">
            <input type="checkbox" id="filter-exclude-offhours" />
            <div class="fp-check-body">
              <span class="fp-check-title">排除不常用時間</span>
              <span class="fp-check-hint">07:00–09:00、12:00–13:30、18:00 後</span>
            </div>
          </label>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Error ───────────────────────────────────────────────────────────────── -->
  <div id="error-msg" class="error-banner" style="display:none"></div>

  <!-- ── Result Meta Bar ────────────────────────────────────────────────────── -->
  <div id="result-meta" class="result-meta" style="display:none">
    <div class="rm-left">
      <span id="rm-count" class="rm-count">0</span>
      <span id="rm-desc" class="rm-desc"> 間會議室</span>
    </div>
    <div class="rm-right">
      <button id="btn-fav-only" class="rm-fav-btn" type="button">
        ★ 只看最愛 (<span id="fav-count">0</span>)
      </button>
      <div class="rm-legend">
        <span class="rm-legend-item">
          <span class="rm-legend-dot" style="background:var(--g-400)"></span>空檔
        </span>
        <span class="rm-legend-item">
          <span class="rm-legend-dot" style="background:var(--p-400)"></span>已預訂
        </span>
      </div>
    </div>
  </div>

  <!-- ── Loading ────────────────────────────────────────────────────────────── -->
  <div id="loading" class="loading-wrap" style="display:none">
    <span class="spinner"></span>
    <span>查詢中…</span>
  </div>

  <!-- ── Result Area (flex: 1) ──────────────────────────────────────────────── -->
  <div id="result-area" class="result-area">

    <!-- Card View -->
    <main id="room-list" class="room-list" style="display:none"></main>

    <!-- Table View -->
    <div id="room-table-wrap" style="display:none">
      <table id="room-table" class="room-table"></table>
    </div>

  </div>

  <!-- ── Booking Confirm Modal ──────────────────────────────────────────────── -->
  <div id="confirm-modal" class="modal" style="display:none">
    <div class="modal-backdrop"></div>
    <div class="confirm-modal-box">
      <button id="confirm-close" class="cm-close-btn" type="button">×</button>
      <div class="cm-label">預訂確認</div>
      <div id="cm-room-name" class="cm-room-name"></div>
      <div id="cm-meta" class="cm-meta"></div>
      <div class="cm-time-block">
        <div class="cm-time-label">時段</div>
        <div id="cm-time" class="cm-time"></div>
      </div>
      <div class="cm-actions">
        <button id="confirm-cancel" class="cm-cancel-btn" type="button">取消</button>
        <button id="confirm-go" class="cm-go-btn" type="button">前往預訂</button>
      </div>
    </div>
  </div>

  <!-- ── Image Lightbox ─────────────────────────────────────────────────────── -->
  <div id="image-viewer" class="img-viewer" style="display:none">
    <img id="image-viewer-img" alt="" />
  </div>

  <!-- ── Room Detail Modal ──────────────────────────────────────────────────── -->
  <div id="room-modal" class="modal" style="display:none">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button id="modal-close" class="modal-close" type="button" aria-label="關閉">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

</div><!-- #app -->

<script src="../js/parser.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
